services:
  db:
    image: postgres:16
    restart: always
    volumes:
      - pgdata:/var/lib/postgresql/data
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '127.0.0.1:${POSTGRES_PORT_HOST}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    restart: always
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile.api
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - '${API_PORT}:${API_PORT}'
    environment:
      - NODE_ENV=production
    volumes:
      - ./uploads:/home/tapiz/uploads
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://localhost:${API_PORT}/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  realtime:
    restart: always
    build:
      context: ./apps/realtime
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - API_URL=http://api:${API_PORT}
      - FRONTEND_URL=${FRONTEND_URL}
      - REALTIME_PORT=4000
    ports:
      - '${REALTIME_PORT:-4000}:4000'
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:4000/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3

  web:
    restart: always
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile.web
      args:
        - API_URL=${API_URL}
        - WS_URL=${WS_URL}
    depends_on:
      api:
        condition: service_healthy
      realtime:
        condition: service_healthy
    ports:
      - '${FRONTEND_PORT}:80'
    env_file:
      - .env

volumes:
  pgdata:
